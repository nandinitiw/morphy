services:
  - type: web
    name: morphy-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      # Free instances have no persistent disk, so SQLite lives in the
      # container and resets when the service restarts or spins down.
      # Demo + GM profiles re-seed automatically on startup (see main.py
      # lifespan); user-ingested games do not survive a restart.
      #
      # To make data persistent, either:
      #   1. attach a Render Postgres instance and set DATABASE_URL to its
      #      connection string, or
      #   2. move to a paid plan and re-add a disk:
      #        plan: starter
      #        disk:
      #          name: morphy-data
      #          mountPath: /data
      #          sizeGB: 1
      #        DATABASE_URL: sqlite:////data/morphy.db
      - key: DATABASE_URL
        value: sqlite:////app/morphy.db
      # Free tier is ~0.1 CPU / 512 MB and restarts under sustained load, which
      # kills long analysis jobs mid-run. Keep each job short enough to finish:
      #   - shallower search (depth 15 -> 12) roughly halves per-game time
      #   - cap the Stockfish loop to the 20 most-recent games
      # Raise/remove both on a paid instance for deeper, fuller analysis.
      - key: ANALYSIS_DEPTH
        value: "12"
      - key: MAX_ANALYZE_GAMES
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
